<!DOCTYPE html>
<html>
<head>
  <title>HinduAI Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest"></script>
</head>
<body style="background:#120600;color:white;font-family:sans-serif">

<h1>HinduAI Chat</h1>

<textarea id="msg"></textarea>
<button onclick="send()">Send</button>

<div id="chat"></div>

<script>
const CLERK_KEY = "pk_live_Y2xlcmsuaGluZHVhaS5pbiQ";

async function init(){
  await Clerk.load({ publishableKey: CLERK_KEY });

  if (!Clerk.user) {
    Clerk.openSignIn();
  }
}

init();

async function send(){
  const text = document.getElementById("msg").value;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  document.getElementById("chat").innerHTML += `
    <p><b>You:</b> ${text}</p>
    <p><b>AI:</b> ${data.reply}</p>
  `;
}
</script>

</body>
</html>
